name: 1. Auto-Validate and Merge Jules PRs
on:
  pull_request:
    branches: [main]
jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'kazah4359-lgtm' || contains(github.event.pull_request.labels.*.name, 'jules')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt || pip install pytest
      - name: Run test suite
        run: pytest
      - name: Auto-approve and Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve
          gh pr merge ${{ github.event.pull_request.number }} --merge --auto
          gh workflow run jules_next_task.yml
