name: 2. Trigger Next Self-Improvement Task

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch: # Позволяет запустить или перезапустить петлю вручную кнопкой

jobs:
  next-task:
    runs-on: ubuntu-latest
    # Запускаем цикл дальше, только если PR был успешно СЛИТ (merged), а не просто закрыт
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event.pull_request.merged == true && github.event.pull_request.user.login == 'google-jules[bot]')
      
    steps:
      - name: Run Google Jules Agent
        uses: google-labs-code/jules-action@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Твоя единственная цель — автономное улучшение архитектуры Magda Agent.
            1. Прочитай docs/cognitive_architecture.md, чтобы понять целевую когнитивную архитектуру и правила governance.
            2. Открой agent_tasks.json в корне репозитория.
            3. Проверь replenishment_policy. Если задач со статусом "todo" нет или их меньше minimum_todo_tasks, сначала добавь новую пачку low/medium-risk задач из docs/cognitive_architecture.md, падающих тестов, TODO-комментариев и текущих архитектурных разрывов.
            4. Возьми первый пункт со статусом "todo".
            5. Полностью реализуй его: код, интеграция, pytest-тесты.
            6. Не выходи за allowed_paths выбранной задачи.
            7. Не меняй .github/workflows/**, requirements.txt, sandbox code, secrets или deployment-файлы, если выбранная задача явно этого не разрешает.
            8. Перед PR запусти python scripts/validate_agent_tasks.py agent_tasks.json и pytest.
            9. После выполнения обнови agent_tasks.json: поставь задаче status "done".
            10. Если задача соответствует пункту в backlog.md, сохрани совместимость и обнови markdown backlog тоже.
            11. Если заметил баги, уязвимости или архитектурные зоны роста — добавь новые задачи со status "todo" в agent_tasks.json.
            12. Не спрашивай пользователя о следующей задаче, если можешь безопасно создать low/medium-risk задачи сам.
            13. Сформируй Pull Request.
