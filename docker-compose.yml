version: '3.8'

services:
  magda_bot:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - consciousness

  consciousness:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    command: uvicorn magda_agent.consciousness.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
