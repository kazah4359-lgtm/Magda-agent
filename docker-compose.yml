version: '3.8'

services:
  consciousness:
    build: .
    command: uvicorn magda_agent.api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  magda_bot:
    build: .
    command: python magda_agent/main.py
    env_file:
      - .env
    environment:
      - CONSCIOUSNESS_API_URL=http://consciousness:8000
    depends_on:
      - consciousness
    restart: unless-stopped
